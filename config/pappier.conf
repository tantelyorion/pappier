# Pappier Configuration File - Version Complète

# === Édition ===
tab_size = 4
auto_indent = true
show_line_numbers = true
highlight_current_line = true
wrap_lines = false
scroll_off = 3
undo_limit = 100

# === Apparence ===
theme = vezo-dark
dark_mode = true
font_size = 14
show_minimap = true
show_project = true
show_git_status = false

# === Recherche ===
search_highlight = true
case_sensitive = false
regex_search = false
incremental_search = true

# === Sauvegarde ===
backup_interval = 30
create_backup = true
backup_dir = .pappier_backup

# === Compilation ===
compiler = gcc
compiler_flags = -Wall -Wextra -O2
output_dir = ./build
auto_compile = false

# === Git ===
git_path = /usr/bin/git
auto_refresh_git = false

# === Interface ===
show_status_bar = true
show_line_numbers = true
scrollbar = true
mouse_support = false

# === Raccourcis ===
# Format: touche:action
ctrl+s:save
ctrl+o:open
ctrl+f:find
ctrl+h:replace
ctrl+z:undo
ctrl+y:redo
ctrl+a:select_all
ctrl+x:cut
ctrl+c:copy
ctrl+v:paste
ctrl+q:quit
ctrl+b:compile
ctrl+r:run
ctrl+g:git
ctrl+p:project
ctrl+\\:split_v
ctrl+-:split_h
ctrl+`:terminal